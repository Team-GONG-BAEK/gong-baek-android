name: GongBaek PR Builder
on:
  pull_request:
    branches: [ develop, main ]
defaults:
  run:
    shell: bash
    working-directory: .
jobs:
  build:
    name: PR Checker
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Gradle cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**/*.kt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Change gradlew permissions
        run: chmod +x ./gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore file
        env:
          STORE_FILE_BASE: ${{ secrets.STORE_FILE }}
        run: |
          mkdir -p keystore
          echo "$STORE_FILE" | base64 --decode > keystore/gongbaek_release.jks

      - name: Generate local.properties
        env:
            STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
            KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
            KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
            GONGBAEK_BASE_URL: ${{ secrets.BASE_URL }}
            KAKAO_API_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
        run: |
            echo "gongbaek.base.url=$GONGBAEK_BASE_URL" >> local.properties
            echo "kakao.native.app.key=$KAKAO_NATIVE_APP_KEY" >> local.properties

      - name: Lint Check
        run: ./gradlew ktlintCheck -PcompileSdkVersion=34

      - name: Build with Gradle
        run: ./gradlew build -PcompileSdkVersion=34
